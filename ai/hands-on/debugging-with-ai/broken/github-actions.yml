name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-lastest          # typo: should be ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: mycompany/flask-api:latest

      # This step runs on every push, including pull requests.
      # It will fail on PRs from forks because they don't have access to secrets.
      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: |
          ssh ${{ secrets.PROD_HOST }} "docker pull mycompany/flask-api:latest && docker compose up -d"
        # Missing: ssh key setup step before this — the SSH connection will fail
