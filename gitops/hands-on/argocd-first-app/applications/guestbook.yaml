apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-decl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook-decl
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # Uncomment to make Argo CD enforce drift correction automatically.
    # Step 9 of the hands-on walks through enabling these.
    # automated:
    #   prune: true
    #   selfHeal: true