apiVersion: apps/v1
kind: Deployment
metadata:
  name: ironhack-web
  namespace: lab05
  labels:
    app: ironhack-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ironhack-web
  template:
    metadata:
      labels:
        app: ironhack-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            # Custom HTML page served from the ConfigMap
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            # Custom nginx server block (serves /hostname endpoint)
            - name: html
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: html
          configMap:
            name: web-html
