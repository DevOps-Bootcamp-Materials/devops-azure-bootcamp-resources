# =============================================================================
# POD — Demonstrating all three ConfigMap/Secret injection patterns
# =============================================================================
# This Pod uses three different injection methods simultaneously so you can
# compare their behaviour side by side in a running container.
#
# Pattern 1: envFrom — bulk-load all keys from a ConfigMap or Secret as env vars.
#            Simple but coarse-grained: all keys become vars, no renaming.
#
# Pattern 2: env[].valueFrom — inject individual keys, with full control over
#            the env var name. Useful when you want to rename a key or mix
#            sources (some from ConfigMap, some from Secret).
#
# Pattern 3: volumeMount + volumes[].configMap — mount the ConfigMap as a
#            directory of files. Each key becomes a filename, each value the
#            file content. Files are UPDATED LIVE by the kubelet (≈60s).
#
# Live-update behaviour:
#   - Patterns 1 and 2 (env vars): the container sees the OLD value until it restarts.
#     You must delete/recreate the Pod or trigger a rolling update.
#   - Pattern 3 (volume): the kubelet syncs the files without a restart.
#     Apps that watch the filesystem (e.g. with inotify) can hot-reload.
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: config-demo
  namespace: lab03
  labels:
    lab: "03"
spec:
  containers:
    - name: app
      image: busybox:1.36
      # Infinite loop to keep the Pod alive so we can exec into it.
      command: ["sh", "-c", "while true; do sleep 3600; done"]

      # -----------------------------------------------------------------------
      # PATTERN 1 — envFrom: load ALL keys from a ConfigMap as environment variables.
      #
      # APP_ENV, LOG_LEVEL, and MAX_CONNECTIONS will appear in 'env'.
      # Keys that are not valid env var names (e.g. 'app.properties' with a dot)
      # are silently skipped — always verify with 'kubectl exec -- env'.
      # -----------------------------------------------------------------------
      envFrom:
        - configMapRef:
            name: app-config-manifest
            # optional: set 'optional: true' to not fail if the ConfigMap doesn't exist

      # -----------------------------------------------------------------------
      # PATTERN 2 — env[].valueFrom: inject individual keys by name.
      #
      # You can rename the key (Secret key DB_USER → env var DB_USER, same name here,
      # but you could use any name). Mixing ConfigMap and Secret sources is fine.
      # -----------------------------------------------------------------------
      env:
        - name: DB_USER           # Name of the environment variable inside the container
          valueFrom:
            secretKeyRef:
              name: app-secret    # The Secret object to read from
              key: DB_USER        # The key within that Secret
              # optional: true    # If false (default), Pod won't start if key is missing

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD

        - name: RUNTIME_ENV       # Renaming: ConfigMap key APP_ENV → env var RUNTIME_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config-manifest
              key: APP_ENV

      # -----------------------------------------------------------------------
      # PATTERN 3 — volumeMount: mount ConfigMap keys as files.
      #
      # The 'name' here must match the name in spec.volumes[].
      # 'mountPath' is the directory where files appear inside the container.
      # 'readOnly: true' prevents the container from modifying the mounted files
      # (good practice — the source of truth is the ConfigMap, not the container).
      # -----------------------------------------------------------------------
      volumeMounts:
        - name: config-volume
          mountPath: /etc/config
          readOnly: true

  # ---------------------------------------------------------------------------
  # volumes — declare the volume source. The container mounts it via volumeMount.
  # The separation between volumes[] and volumeMounts[] allows multiple containers
  # in the same Pod to share or independently mount the same volume.
  # ---------------------------------------------------------------------------
  volumes:
    - name: config-volume
      configMap:
        name: app-config-manifest
        # 'items' lets you selectively mount specific keys and rename them.
        # Without 'items', ALL keys in the ConfigMap appear as files.
        items:
          - key: app.properties   # Key in the ConfigMap
            path: app.properties  # Filename inside mountPath (/etc/config/app.properties)
          - key: log-level
            path: log-level       # → /etc/config/log-level

  restartPolicy: Never
