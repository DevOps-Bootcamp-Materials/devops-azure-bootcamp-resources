# =============================================================================
# SECRET — Sensitive configuration with restricted access
# =============================================================================
# A Secret is structurally identical to a ConfigMap but carries two extra
# guarantees when the cluster is properly hardened:
#
#   1. Encryption at rest:  etcd can be configured to encrypt Secret values
#      on disk (EncryptionConfiguration). Without this, values sit as
#      base64 strings in etcd — readable by anyone with etcd access.
#
#   2. RBAC isolation:  you can grant a service account access to ConfigMaps
#      but not Secrets, or to specific Secrets by name. This limits the blast
#      radius if a workload is compromised.
#
# IMPORTANT — base64 is NOT encryption:
#   The 'data' field stores values base64-encoded for transport safety.
#   Anyone with 'kubectl get secret' access can decode them instantly:
#     kubectl get secret app-secret -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#   base64 only prevents accidental exposure in logs or terminals.
#
# Production secret management options (beyond vanilla Secrets):
#   - Sealed Secrets (Bitnami): encrypt secrets client-side, safe to commit to Git
#   - External Secrets Operator: sync from AWS Secrets Manager, GCP Secret Manager, Vault
#   - HashiCorp Vault + Agent Injector: inject secrets as files without storing in etcd
#
# NEVER commit this file to Git with real credentials.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: lab03
  labels:
    lab: "03"

# 'Opaque' is the generic Secret type — arbitrary key-value pairs.
# Other built-in types carry additional validation:
#   kubernetes.io/tls            → must contain 'tls.crt' and 'tls.key'
#   kubernetes.io/dockerconfigjson → registry pull credentials
#   kubernetes.io/service-account-token → auto-created for ServiceAccounts
type: Opaque

# Values in 'data' MUST be base64-encoded.
# Generate with: echo -n "yourvalue" | base64
# The '-n' flag is critical — without it, echo adds a newline which changes the hash.
data:
  DB_USER: YWRtaW4=                    # Decodes to: admin
  DB_PASSWORD: c3VwZXJzZWNyZXQxMjM=   # Decodes to: supersecret123

# ---------------------------------------------------------------------------
# Alternative: 'stringData' accepts plain text.
# Kubernetes base64-encodes it before storing. Never round-trips back as stringData.
# Useful for human-readable manifests in dev (still don't commit to Git).
# ---------------------------------------------------------------------------
# stringData:
#   DB_USER: admin
#   DB_PASSWORD: supersecret123
