# =============================================================================
# DaemonSet 101 — one Pod on every (schedulable, untainted) node
# =============================================================================
# A DaemonSet has no `replicas` field. The controller computes the desired
# count from the set of nodes that match the Pod template's nodeSelector /
# nodeAffinity AND whose taints the Pod tolerates. Add a node, get a Pod.
# Drain a node, lose a Pod.
#
# This basic example has no nodeSelector and no tolerations, so it will land
# on every standard (untainted) worker node.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-heartbeat
  namespace: lab10
  labels:
    app: node-heartbeat
spec:
  selector:
    matchLabels:
      app: node-heartbeat
  template:
    metadata:
      labels:
        app: node-heartbeat
    spec:
      # Make the Pod exit quickly during rollouts / cleanup.
      terminationGracePeriodSeconds: 5
      containers:
        - name: heartbeat
          image: busybox:1.36
          # Print the node we are on once per minute. This is what a real
          # node-level agent would do (collect metrics, ship logs, ...).
          command:
            - sh
            - -c
            - |
              while true; do
                echo "$(date -Iseconds) heartbeat from node=$NODE_NAME"
                sleep 60
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
