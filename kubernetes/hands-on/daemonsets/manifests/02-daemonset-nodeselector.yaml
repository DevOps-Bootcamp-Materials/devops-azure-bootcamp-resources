# =============================================================================
# DaemonSet restricted to a subset of nodes
# =============================================================================
# Real DaemonSets rarely run on EVERY node. You typically want a logs agent on
# Linux nodes only, a GPU monitor on GPU nodes only, etc. The standard way to
# express that is `nodeSelector` (or `nodeAffinity` for richer expressions).
#
# This DaemonSet lands ONLY on nodes labelled `agent-role=logs`. The controller
# reacts in real time to label changes: label more nodes → more Pods; remove
# the label → Pods are evicted.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: logs-agent
  namespace: lab10
  labels:
    app: logs-agent
spec:
  selector:
    matchLabels:
      app: logs-agent
  template:
    metadata:
      labels:
        app: logs-agent
    spec:
      # Only schedule on nodes that opt in by carrying this label.
      nodeSelector:
        agent-role: logs
      terminationGracePeriodSeconds: 5
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - "echo started on $NODE_NAME; sleep infinity"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
