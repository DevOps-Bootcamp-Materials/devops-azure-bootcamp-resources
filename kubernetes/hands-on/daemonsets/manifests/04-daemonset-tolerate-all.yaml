# =============================================================================
# Tolerate-every-taint DaemonSet — the cluster-wide agent pattern
# =============================================================================
# Cluster-critical agents (kube-proxy, CNI, CSI drivers, log/metric collectors)
# must run on EVERY node — including control-plane nodes, GPU pools, spot
# pools, and any nodes the admin has tainted. The way to express "I do not
# care what taints you carry" is a single toleration with `operator: Exists`
# and NO key.
#
# Combined with no nodeSelector, this is the most permissive DaemonSet you can
# write: one Pod on every node, no matter what.
#
# Compare with manifest 01: that one is blocked by ANY NoSchedule taint.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cluster-agent
  namespace: lab10
  labels:
    app: cluster-agent
spec:
  selector:
    matchLabels:
      app: cluster-agent
  template:
    metadata:
      labels:
        app: cluster-agent
    spec:
      # "Tolerate everything." The empty key + operator: Exists is the wildcard.
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - "echo cluster-agent on $NODE_NAME; sleep infinity"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
