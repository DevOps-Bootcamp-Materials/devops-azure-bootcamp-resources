# =============================================================================
# updateStrategy: OnDelete — operator-paced rollouts
# =============================================================================
# Two update strategies are supported:
#
#   RollingUpdate  (default)
#       The controller replaces Pods automatically, respecting maxUnavailable.
#       Good for stateless agents — push a new image, walk away.
#
#   OnDelete
#       The controller never touches existing Pods. Updates to the template
#       only apply to NEW Pods. To roll a node, you `kubectl delete pod` it
#       yourself. Good for stateful agents where each node-level rollout
#       needs operator judgement (flush counters, drain a buffer, ...).
#
# This DaemonSet pins itself to OnDelete to demonstrate the difference.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: manual-agent
  namespace: lab10
  labels:
    app: manual-agent
spec:
  updateStrategy:
    type: OnDelete                # vs. the default RollingUpdate
  selector:
    matchLabels:
      app: manual-agent
  template:
    metadata:
      labels:
        app: manual-agent
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: c
          image: busybox:1.36
          command: ["sh", "-c", "echo manual-agent on $NODE_NAME; sleep infinity"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
