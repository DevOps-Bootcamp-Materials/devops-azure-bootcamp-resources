apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-k3d-ingress
  namespace: hello
spec:
  # K3s ships Traefik as the default IngressClass — no ingressClassName needed,
  # but we set it explicitly so the manifest documents itself.
  ingressClassName: traefik
  rules:
    - host: hello.k3d
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-k3d-svc
                port:
                  number: 80
