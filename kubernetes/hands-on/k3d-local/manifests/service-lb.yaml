apiVersion: v1
kind: Service
metadata:
  name: hello-k3d-lb
  namespace: hello
spec:
  # On k3d this gets a real EXTERNAL-IP out of the box (klipper-lb / ServiceLB).
  # Compare with minikube, where the same manifest sits <pending> until you run a tunnel.
  type: LoadBalancer
  selector:
    app: hello-k3d
  ports:
    - port: 8081
      targetPort: 80
      protocol: TCP
