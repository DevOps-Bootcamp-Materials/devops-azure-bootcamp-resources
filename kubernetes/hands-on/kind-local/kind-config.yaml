# kind cluster: 1 control-plane + 2 workers, with the host ports needed for ingress.
#
# - extraPortMappings: opens host ports 80/443 into the control-plane node container,
#   so an ingress controller running there is reachable at http://localhost.
# - node-labels "ingress-ready=true": the ingress-nginx kind manifest uses a
#   nodeSelector on this label to schedule the controller on this node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
