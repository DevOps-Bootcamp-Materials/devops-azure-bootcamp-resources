# =============================================================================
# "Naked" Pod — no resources block at all
# =============================================================================
# Without a LimitRange in the namespace this Pod would be BestEffort.
# WITH the LimitRange from 07-limitrange.yaml applied, the admission
# controller injects the defaultRequest and default values, and the Pod ends
# up Burstable instead.
#
# Verify after applying:
#   kubectl get pod naked-pod -o jsonpath='{.status.qosClass}'  # Burstable
#   kubectl get pod naked-pod -o jsonpath='{.spec.containers[0].resources}'
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: naked-pod
  namespace: lab08
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      # No resources: requests or limits. The LimitRange fills these in.
