# =============================================================================
# Pod with an impossibly large memory REQUEST — stays Pending forever
# =============================================================================
# Demonstrates that 'requests' is the input to the scheduler. No node in a
# minikube cluster has 100 GiB of allocatable memory, so the scheduler emits a
# FailedScheduling event and the Pod never starts.
#
# After running 'kubectl describe pod memory-hog', you should see in the
# Events section a message like:
#   "0/1 nodes are available: 1 Insufficient memory. preemption: ..."
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: memory-hog
  namespace: lab08
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          memory: "100Gi"     # No way this fits on any minikube node.
                              # Note that LIMITS would not affect scheduling —
                              # only requests do.
