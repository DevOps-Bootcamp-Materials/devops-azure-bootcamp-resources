# =============================================================================
# Oversized Pod — requests memory above the LimitRange max
# =============================================================================
# The LimitRange in 07-limitrange.yaml sets max.memory=512Mi at the Container
# level. This Pod asks for 4Gi → the API server rejects the create call with:
#   "maximum memory usage per Container is 512Mi"
#
# Use 'kubectl apply -f 03-oversized-request.yaml' and read the error.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: oversized
  namespace: lab08
spec:
  containers:
    - name: c
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          memory: "4Gi"          # Above LimitRange max.memory (512Mi) → rejected
