apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-html
  namespace: hello
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>Hello from minikube</title></head>
      <body style="font-family: sans-serif; text-align: center; margin-top: 15vh;">
        <h1>Hello from minikube</h1>
        <p>This page is served by nginx running inside a local Kubernetes cluster.</p>
        <p>The HTML you are reading lives in a ConfigMap, mounted as a volume.</p>
      </body>
    </html>
