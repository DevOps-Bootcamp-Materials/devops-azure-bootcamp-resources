# =============================================================================
# POD with PersistentVolumeClaim mount
# =============================================================================
# This Pod demonstrates how a developer consumes persistent storage without
# knowing anything about the underlying PV or storage backend.
#
# The chain:
#   spec.volumes[].persistentVolumeClaim.claimName → PVC → PV → actual disk
#
# The Pod only references the PVC by name. Kubernetes resolves the rest.
# If the PVC is not yet Bound, the Pod stays in Pending state until it is.
#
# Key distinction from ephemeral storage:
#   - emptyDir:   temporary directory, lives as long as the Pod. Lost on deletion.
#   - hostPath:   mounts a node path, not portable across nodes.
#   - PVC:        independent of Pod lifecycle. Data survives Pod restarts,
#                 rescheduling, and deletion.
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: storage-demo
  namespace: lab04
  labels:
    lab: "04"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "while true; do sleep 3600; done"]

      volumeMounts:
        - name: persistent-storage    # Must match the name in spec.volumes[]
          mountPath: /mnt/data        # The directory inside the container.
                                      # If the directory already exists in the image,
                                      # the volume mount OVERLAYS it (original content hidden).
          # subPath: myapp/           # Optional: mount only a subdirectory of the volume.
                                      # Useful when sharing one PVC across multiple containers.
          # readOnly: false           # Default is false. Set true for read-only consumers.

  # ---------------------------------------------------------------------------
  # volumes — the volume source definitions for this Pod.
  # A volume declared here can be mounted by any container in the Pod.
  # ---------------------------------------------------------------------------
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: my-pvc     # The PVC must exist in the SAME namespace as the Pod.
                              # Kubernetes uses the PVC → PV binding to locate the storage.
        # readOnly: false     # Can override to mount the PVC read-only at the Pod level.

  restartPolicy: Always   # 'Always' (default for Deployments): restart if container exits.
                          # Important for stateful Pods — we want them to come back
                          # and reconnect to the same PVC on restart.
