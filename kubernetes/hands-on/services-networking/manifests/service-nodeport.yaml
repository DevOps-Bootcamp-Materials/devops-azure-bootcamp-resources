# =============================================================================
# SERVICE (NodePort) — External access through a static port on every node
# =============================================================================
# How NodePort works:
#   1. Kubernetes picks (or you specify) a port in the range 30000–32767.
#   2. kube-proxy opens that port on EVERY node in the cluster, regardless
#      of whether the node runs a matching Pod.
#   3. Traffic arriving at <any-node-ip>:<nodePort> is NAT'd to the Service
#      CLUSTER-IP, which then load-balances to the healthy Pods.
#
# NodePort extends ClusterIP — the ClusterIP is still created and usable
# for intra-cluster communication.
#
# Limitations in production:
#   - Only one service per port. Hard to manage at scale (dozens of services).
#   - Exposes a port on ALL nodes, even nodes that don't run that workload.
#   - No TLS termination, no path-based routing, no host-based routing.
#   - In cloud environments, you need the node IPs to be reachable, which
#     often means opening firewall rules — not ideal.
#
# Use NodePort for:
#   - Local development and testing (minikube, kind)
#   - Internal tools where you control the client
#   - Environments without a cloud load balancer
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: lab02
  labels:
    app: web
    lab: "02"
spec:
  type: NodePort
  selector:
    app: web
    version: v1
  ports:
    - name: http
      protocol: TCP
      port: 80            # ClusterIP port — intra-cluster traffic uses this.
      targetPort: 80      # Container port.
      nodePort: 30080     # Static port opened on every node.
                          # Valid range: 30000–32767.
                          # If you omit this field, Kubernetes assigns a random
                          # port from the range. Random ports are fine in dev
                          # but make bookmarking/docs harder — pin it if possible.
