# =============================================================================
# Secret MOUNTED AS A VOLUME — TLS certificate at /etc/tls/
# =============================================================================
# When a Secret is mounted as a volume:
#   - The values are AUTOMATICALLY base64-decoded at mount time (so the file
#     contains the real cert, not the base64 string)
#   - The mount is backed by tmpfs (the bytes never touch the node's disk)
#   - You can restrict file mode to 0400 so only the container's user can read
#
# The Secret values below are a self-signed cert generated only for this lab.
# Never commit real certificates to git — use Sealed Secrets, External Secrets,
# or Azure Key Vault CSI driver in real projects.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: demo-tls
  namespace: lab04
  labels:
    lab: "04"
type: kubernetes.io/tls   # Special type for TLS pairs. The kubelet validates
                          # that 'tls.crt' and 'tls.key' are present and parsable.
stringData:               # stringData is more readable than 'data' (which
                          # requires you to base64-encode by hand). Kubernetes
                          # converts it to base64 before storing in etcd.
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIBhTCCASugAwIBAgIUaeFq7+oj9zXFwY1+gOyzPBPCh1QwCgYIKoZIzj0EAwIw
    HzELMAkGA1UEBhMCRVMxEDAOBgNVBAMMB2xhYjA0LmlvMB4XDTI1MDEwMTAwMDAw
    MFoXDTM1MDEwMTAwMDAwMFowHzELMAkGA1UEBhMCRVMxEDAOBgNVBAMMB2xhYjA0
    LmlvMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEQ8gh6c1WJ7c8z5oQYJYg8oZF
    n8K0t8gI3eJk8m6n3PXqHmYr0VtPJqJp9zCxKQ2ZcVqV/Bv7P1ApRZkXfP6QmKNT
    MFEwHQYDVR0OBBYEFGqB7G8N3z8yYpZpSrPLzqKxqfDDMB8GA1UdIwQYMBaAFGqB
    7G8N3z8yYpZpSrPLzqKxqfDDMA8GA1UdEwEB/wQFMAMBAf8wCgYIKoZIzj0EAwID
    SAAwRQIgQbN4P2c8YkPnQ8c3pY7Yh6P3pZbXm2NHd9rJZHcfQjkCIQCmQk6mY1Wx
    DEMO-PLACEHOLDER-NOT-A-REAL-CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    DEMO-PLACEHOLDER-NOT-A-REAL-KEY
    -----END PRIVATE KEY-----

---
apiVersion: v1
kind: Pod
metadata:
  name: tls-consumer
  namespace: lab04
  labels:
    lab: "04"
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: tls
          mountPath: /etc/tls
          readOnly: true        # Belt and suspenders: even though the mount
                                # mode is 0400, mark the whole mount readOnly
                                # so the container can never modify the cert.

  volumes:
    - name: tls
      secret:
        secretName: demo-tls
        defaultMode: 0400       # rw------- for the owner only. Important for
                                # private keys — many TLS libraries (ssh,
                                # openssl) refuse to load keys with looser
                                # permissions.
        # optional: false       # If true, the Pod can start even if the
                                # Secret does not exist. Default false.
