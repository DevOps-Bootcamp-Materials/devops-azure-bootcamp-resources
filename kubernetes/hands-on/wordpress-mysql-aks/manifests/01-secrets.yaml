# =============================================================================
# Secrets — MySQL credentials consumed by both MySQL and WordPress
# =============================================================================
# A single Secret holds:
#   - MYSQL_ROOT_PASSWORD : the MySQL admin password
#   - MYSQL_DATABASE      : the database name MySQL creates on first boot
#   - MYSQL_USER          : non-root user WordPress connects with
#   - MYSQL_PASSWORD      : password for the WP user
#
# Both StatefulSet (mysql) and Deployment (wordpress) read this same Secret
# via envFrom or secretKeyRef. That way the credential lives in one place and
# you cannot have them drift out of sync.
#
# ▲ In production, NEVER commit plaintext passwords like this. Use:
#     - Sealed Secrets (Bitnami)              → encrypted YAML safe to commit
#     - External Secrets Operator + Key Vault → values stay in Azure Key Vault
#     - Azure Key Vault provider for Secrets Store CSI Driver
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: wordpress
  labels:
    lab: "07"
type: Opaque
stringData:                # stringData is auto-base64-encoded by the API server
                           # before being stored in etcd. Easier to read in git
                           # than 'data' (which would be base64 by hand).
  MYSQL_ROOT_PASSWORD: "ChangeMeRoot_2026!"
  MYSQL_DATABASE: "wordpress"
  MYSQL_USER: "wpuser"
  MYSQL_PASSWORD: "ChangeMeWp_2026!"
