# =============================================================================
# PVC restored FROM a VolumeSnapshot
# =============================================================================
# To consume a snapshot, you create a NEW PVC whose 'dataSource' points at the
# snapshot. The CSI driver provisions a new Azure Disk and hydrates it from the
# snapshot contents before the PVC reaches Bound state.
#
# You can use this PVC in two ways:
#   1. Mount it into a temporary Pod to validate the contents before swapping
#      it in for the original PVC (the safer production pattern).
#   2. Re-create the StatefulSet pointing at this PVC name (faster, used in
#      the lab — see 02b-mysql-statefulset-from-snapshot.yaml).
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-restored
  namespace: wordpress
  labels:
    app: mysql
    lab: "07"
    source: snapshot
spec:
  storageClassName: managed-csi
  dataSource:                         # The snapshot we are cloning from.
    name: mysql-snapshot
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi                   # Must be >= the snapshot's source PVC size.
                                       # Same as the original to keep things simple.
