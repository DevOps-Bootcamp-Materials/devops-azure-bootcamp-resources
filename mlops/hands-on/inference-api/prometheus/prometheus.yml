global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: inference-api
    metrics_path: /metrics/
    static_configs:
      - targets:
          - inference-api:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090