services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus_01
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - monitoring

  # Grafana: visualization and dashboarding
  # The provisioning volume pre-configures the Prometheus datasource on startup.
  # Students do not need to add it manually — it is already there when Grafana starts.
  # See: grafana/provisioning/datasources/prometheus.yml
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Node Exporter: exposes host OS metrics (CPU, RAM, disk, network)
  # Runs in host network mode so it can read the real host's /proc and /sys
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - monitoring

  # A simple Go app that exposes realistic HTTP metrics (counter + histogram).
  # Source: https://github.com/brancz/prometheus-example-app
  # Exposes: http_requests_total{handler,code}, http_request_duration_seconds{handler}
  demo-app:
    image: quay.io/brancz/prometheus-example-app:v0.3.0
    container_name: demo-app
    ports:
      - "8080:8080"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
