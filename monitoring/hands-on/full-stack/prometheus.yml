# prometheus.yml — full monitoring stack
# Scrapes Prometheus itself, Node Exporter (host metrics), and the demo app.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Node Exporter exposes Linux host metrics (CPU, memory, disk, network).
  # Two targets so the `$instance` Grafana variable in Part B has more than
  # one value. Both are reading the same /proc underneath, so the metric
  # values will be very similar — what matters here is that Prometheus sees
  # two distinct `instance` label values.
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
          - "node-exporter-b:9100"

  # Demo app for application-level metrics
  - job_name: "demo"
    static_configs:
      - targets: ["demo-app:8080"]
