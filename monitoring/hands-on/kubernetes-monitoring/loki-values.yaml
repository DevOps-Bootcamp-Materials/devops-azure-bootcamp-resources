# loki-values.yaml — minimal single-binary Loki for the classroom.
#
# The grafana/loki chart can deploy Loki in several topologies. For a local
# cluster we want the simplest one: a single pod, filesystem storage, no object
# store, no caches, no gateway. This is NOT a production layout — see the
# resources README for the SimpleScalable / distributed alternatives.
deploymentMode: SingleBinary

loki:
  auth_enabled: false          # no multi-tenancy; every request is the same tenant
  commonConfig:
    replication_factor: 1      # single replica, so no replication
  storage:
    type: filesystem           # store chunks/index on the pod's local disk
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 72h      # short retention is plenty for the classroom
  # Silence the "structured metadata requires tsdb/v13" and ruler warnings.
  rulerConfig:
    storage:
      type: local

# One Loki pod, no horizontal-scaling components.
singleBinary:
  replicas: 1
backend:   { replicas: 0 }
read:      { replicas: 0 }
write:     { replicas: 0 }

# Disable everything we do not need for a learning deployment.
gateway:
  enabled: false               # talk to the loki service directly on :3100
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: false
  dashboards:
    enabled: false
  rules:
    enabled: false
