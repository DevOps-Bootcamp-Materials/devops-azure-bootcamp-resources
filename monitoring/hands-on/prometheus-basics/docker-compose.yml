services:
  # Prometheus: scrapes itself and stores time series data.
  # Its own /metrics endpoint exposes all four metric types — enough for the basics hands-on.
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"           # Expression Browser and API
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"   # allows POST /-/reload to hot-reload config
