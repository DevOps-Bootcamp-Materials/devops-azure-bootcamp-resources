global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules from separate files
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Send fired alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "demo"
    static_configs:
      - targets: ["demo-app:8080"]
