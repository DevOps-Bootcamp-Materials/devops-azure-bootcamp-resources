global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "faulty-app"
    static_configs:
      - targets: ["faulty-app:8080"]
    # Relabeling adds a human-readable job label for Grafana legends
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: faulty-app

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
