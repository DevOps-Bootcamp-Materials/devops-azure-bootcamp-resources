apiVersion: v1
kind: Namespace
metadata:
  name: tunnel-demo
  labels:
    purpose: ngrok-hands-on
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tunnel-demo
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: traefik/whoami
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: tunnel-demo
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
