#
#  (c) Path rewrite (rewrite = transparent; redirect = 301 back to client)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: productpage-rewrite
# spec:
#   hosts: ["productpage"]
#   http:
#   - match:
