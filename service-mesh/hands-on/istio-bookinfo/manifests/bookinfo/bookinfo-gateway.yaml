#       abort:
#         percentage: { value: 10 }
#         httpStatus: 500
#     route:
#     - destination: { host: ratings, subset: v1 }
#
#  (g) Mirroring / shadow traffic (copy to v2 without affecting the user)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: reviews-mirror
# spec:
#   hosts: ["reviews"]
#   http:
#   - route:
#     - destination: { host: reviews, subset: v1 }   # real response to the user
#     mirror: { host: reviews, subset: v2 }          # blind copy to v2
#     mirrorPercentage: { value: 100 }
#
#  (h) CORS and header manipulation
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: productpage-cors
# spec:
#   hosts: ["productpage"]
#   http:
#   - route:
#     - destination: { host: productpage }
