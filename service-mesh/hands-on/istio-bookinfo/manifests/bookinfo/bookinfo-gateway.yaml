# metadata:
#   name: bookinfo-gateway-redirect
# spec:
#   selector:
#     istio: ingressgateway
#   servers:
#   - port: { number: 80, name: http, protocol: HTTP }
#     hosts: ["*"]
#     tls:
#       httpsRedirect: true
#
#  (d) Other protocols: HTTP | HTTPS | HTTP2 | GRPC | TCP | TLS | MONGO
#      (e.g. expose Redis/Mongo over TCP through the mesh)
#
#
# -----------------------------------------------------------------------------
#  VIRTUALSERVICE — where I route each request
# -----------------------------------------------------------------------------
#
#  (a) Canary / traffic splitting (90% v1, 10% v3)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: reviews-canary
