#       allowOrigins:
#       - exact: https://example.com
#       allowMethods: [GET, POST]
#     headers:
#       request:
#         set: { x-mesh: bookinfo }
#       response:
#         remove: [x-powered-by]
#
# -----------------------------------------------------------------------------
#  Suggested walkthrough (all on Bookinfo, nothing new to deploy):
#  1. No rules          -> reviews "dances" (round-robin): why you need a mesh
#  2. VS to v1          -> pin the version (basic routing)
#  3. A/B end-user jason-> header-based routing
#  4. Canary 90/10->50/50-> traffic splitting
#  5. Fault + timeout   -> resilience and cascading failures (see it in Kiali)
#  6. Gateway with TLS  -> "production mode" wrap-up
# =============================================================================
