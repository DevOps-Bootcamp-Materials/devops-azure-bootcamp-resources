#
#  (d) Timeout (cuts off slow requests; pair with fault.delay)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: reviews-timeout
# spec:
#   hosts: ["reviews"]
#   http:
#   - route:
#     - destination: { host: reviews, subset: v1 }
#     timeout: 0.5s
#
#  (e) Retries (resilience without touching the app code)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: ratings-retries
# spec:
#   hosts: ["ratings"]
#   http:
#   - route:
#     - destination: { host: ratings }
#     retries:
#       attempts: 3
#       perTryTimeout: 2s
#       retryOn: 5xx,connect-failure
#
#  (f) Fault injection (controlled chaos: delay + abort)
# ---
# apiVersion: networking.istio.io/v1
# kind: VirtualService
# metadata:
#   name: ratings-fault
# spec:
#   hosts: ["ratings"]
